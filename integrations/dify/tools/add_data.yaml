identity:
  name: "add_data"
  author: "topoteretes"
  label:
    en_US: "Add Data"
    zh_Hans: "添加数据"
    pt_BR: "Adicionar Dados"
    ja_JP: "データ追加"
description:
  human:
    en_US: "Add text data to a Cognee dataset for knowledge graph processing"
    zh_Hans: "向 Cognee 数据集添加文本数据以进行知识图谱处理"
    pt_BR: "Adicionar dados de texto a um dataset Cognee para processamento de grafo de conhecimento"
    ja_JP: "ナレッジグラフ処理のために Cognee データセットにテキストデータを追加"
  llm: "Add text data to a Cognee dataset. Use this to ingest text content into a named dataset before running cognify to build the knowledge graph."
parameters:
  - name: text_data
    type: string
    required: true
    label:
      en_US: "Text Data"
      zh_Hans: "文本数据"
      pt_BR: "Dados de Texto"
      ja_JP: "テキストデータ"
    human_description:
      en_US: "Text content to add to the dataset"
      zh_Hans: "要添加到数据集的文本内容"
      pt_BR: "Conteúdo de texto para adicionar ao dataset"
      ja_JP: "データセットに追加するテキスト内容"
    llm_description: "The text content to add to the dataset. Multiple items can be separated by newlines."
    form: llm
  - name: dataset_name
    type: string
    required: false
    label:
      en_US: "Dataset Name"
      zh_Hans: "数据集名称"
      pt_BR: "Nome do Dataset"
      ja_JP: "データセット名"
    human_description:
      en_US: "Name of the target dataset. Either dataset_name or dataset_id must be provided."
      zh_Hans: "目标数据集名称。dataset_name 或 dataset_id 必须提供其一。"
      pt_BR: "Nome do dataset de destino. dataset_name ou dataset_id deve ser fornecido."
      ja_JP: "対象データセット名。dataset_name または dataset_id のいずれかが必要です。"
    llm_description: "The name of the dataset to add the text data to. Either dataset_name or dataset_id must be provided."
    form: llm
  - name: dataset_id
    type: string
    required: false
    label:
      en_US: "Dataset ID"
      zh_Hans: "数据集 ID"
      pt_BR: "ID do Dataset"
      ja_JP: "データセット ID"
    human_description:
      en_US: "UUID of an existing dataset. Either dataset_name or dataset_id must be provided."
      zh_Hans: "已有数据集的 UUID。dataset_name 或 dataset_id 必须提供其一。"
      pt_BR: "UUID de um dataset existente. dataset_name ou dataset_id deve ser fornecido."
      ja_JP: "既存データセットの UUID。dataset_name または dataset_id のいずれかが必要です。"
    llm_description: "The UUID of an existing dataset. Either dataset_name or dataset_id must be provided."
    form: llm
  - name: node_set
    type: string
    required: false
    label:
      en_US: "Node Set"
      zh_Hans: "节点集"
      pt_BR: "Conjunto de Nós"
      ja_JP: "ノードセット"
    human_description:
      en_US: "Comma-separated node set names for graph organization"
      zh_Hans: "用于图谱组织的节点集名称，用逗号分隔"
      pt_BR: "Nomes de conjuntos de nós separados por vírgula para organização do grafo"
      ja_JP: "グラフ構成用のノードセット名（カンマ区切り）"
    llm_description: "Optional comma-separated node set names for organizing data in the knowledge graph"
    form: llm
output_schema:
  type: object
  properties:
    dataset_name:
      type: string
      description: "The dataset name that data was added to"
    dataset_id:
      type: string
      description: "The UUID of the dataset"
    data_id:
      type: string
      description: "UUID of the first added data item – use with Delete Data to remove it"
    items_count:
      type: number
      description: "Number of text items added"
extra:
  python:
    source: tools/add_data.py
