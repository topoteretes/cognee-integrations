identity:
  author: "topoteretes"
  name: "cognee"
  label:
    en_US: "Cognee"
    zh_Hans: "Cognee"
    pt_BR: "Cognee"
    ja_JP: "Cognee"
  description:
    en_US: "Knowledge engine to build personalized and dynamic AI memory for agents."
    zh_Hans: "个性化和动态AI记忆的构建知识引擎"
    pt_BR: "Engenheiro de conhecimento para construir memória personalizada e dinâmica para agentes de IA."
    ja_JP: "AI エージェントのための個性化された動的なAIメモリを構築するための知識エンジン。"
  icon: "cognee.svg"
  tags:
    - search
    - utilities

credentials_for_provider:
  base_url:
    type: text-input
    required: true
    label:
      en_US: "Base URL"
      zh_Hans: "Base URL"
      pt_BR: "Base URL"
      ja_JP: "Base URL"
    placeholder:
      en_US: "https://tenant-xxx.cloud.cognee.ai/api"
      zh_Hans: "https://tenant-xxx.cloud.cognee.ai/api"
      pt_BR: "https://tenant-xxx.cloud.cognee.ai/api"
      ja_JP: "https://tenant-xxx.cloud.cognee.ai/api"
    help:
      en_US: "Your Cognee API base URL (e.g. https://tenant-xxx.cloud.cognee.ai/api)"
      zh_Hans: "您的 Cognee API base URL（例如 https://tenant-xxx.cloud.cognee.ai/api）"
      pt_BR: "Sua URL base da API Cognee (ex: https://tenant-xxx.cloud.cognee.ai/api)"
      ja_JP: "Cognee API のベース URL（例: https://tenant-xxx.cloud.cognee.ai/api）"
  api_key:
    type: secret-input
    required: true
    label:
      en_US: "API Key"
      zh_Hans: "API Key"
      pt_BR: "API Key"
      ja_JP: "API Key"
    placeholder:
      en_US: "Enter your Cognee API key"
      zh_Hans: "请输入您的 Cognee API Key"
      pt_BR: "Insira sua chave de API Cognee"
      ja_JP: "Cognee API キーを入力してください"
    help:
      en_US: "Your Cognee API key for authentication"
      zh_Hans: "用于认证的 Cognee API Key"
      pt_BR: "Sua chave de API Cognee para autenticação"
      ja_JP: "認証用の Cognee API キー"

tools:
  - tools/add_data.yaml
  - tools/add_file.yaml
  - tools/cognify.yaml
  - tools/search.yaml
  - tools/create_dataset.yaml
  - tools/get_datasets.yaml
  - tools/get_dataset_data.yaml
  - tools/delete_dataset.yaml
  - tools/delete_data.yaml
extra:
  python:
    source: provider/cognee.py
