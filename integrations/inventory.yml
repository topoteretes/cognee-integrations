# Cognee Integrations Inventory
#
# Tracks all integrations in this monorepo.
# Update this file when adding or migrating integrations.

# ownership values:
#   cognee-owned
#   partner-owned
#
# migration_status values:
#   done       - code lives in this monorepo and is the primary dev location
#   pending    - still in separate repo, migration planned
#   skipped    - migration deferred
#
# install_path_status values:
#   stable                  - install path/package name preserved
#   replacement-documented  - old path replaced and docs point to new path
#   unknown                 - not yet validated
#
# archive_status values:
#   n/a       - no separate legacy repo to archive
#   tracked   - legacy repo exists; redirect/archive tracking in progress
#   archived  - legacy repo archived and points to monorepo path
#   pending   - legacy repo exists; archive/redirect not yet handled

integrations:

